
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>MacroLegend</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/ringbearer" rel="stylesheet">
  <style>
    :root{
      --surface:#f6f7fb;
      --card:#ffffff;
      --card-2:#f8fafe;
      --text:#162036;
      --muted:#5a6784;
      --line:rgba(43,120,228,.18);
      --accent:#2b78e4;
      --accent-2:#3fb073;
      --warn:#e3b322;
      --danger:#e45555;
      --shadow-1:0 10px 22px rgba(22,32,54,.10);
      --shadow-2:0 18px 42px rgba(22,32,54,.14);
      --ring:0 0 0 3px rgba(43,120,228,.16);
      --radius-xl:28px;
      --radius-lg:18px;
      --radius-md:14px;
      --safe-bottom:max(20px, env(safe-area-inset-bottom));
      --safe-top:max(12px, env(safe-area-inset-top));
    }
    body.ringmode{
      --surface:#0f0c05;
      --card:#18130a;
      --card-2:#20180c;
      --text:#f4e9bd;
      --muted:#c4b68c;
      --line:rgba(237,185,65,.22);
      --accent:#edb941;
      --accent-2:#8fd7a8;
      --warn:#ffd86a;
      --danger:#ff8178;
      --shadow-1:0 12px 26px rgba(0,0,0,.28);
      --shadow-2:0 22px 54px rgba(0,0,0,.38);
      --ring:0 0 0 3px rgba(237,185,65,.14);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 50% -10%, #ffffff 0%, #f0f4ff 52%, #e7eefc 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding:calc(18px + var(--safe-top)) 12px calc(96px + var(--safe-bottom));
    }
    body.ringmode{
      background:
        radial-gradient(1000px 700px at 50% -10%, #31240f 0%, #171107 58%, #0f0b05 100%);
    }
    button,input,select{font:inherit}
    .app{
      width:min(100%, 860px);
      margin:0 auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-2);
      overflow:hidden;
      position:relative;
    }
    .topbar{
      padding:16px 16px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,0));
      display:grid;
      gap:12px;
      border-bottom:1px solid var(--line);
    }
    body.ringmode .topbar{ background:linear-gradient(180deg, rgba(255,233,179,.05), rgba(0,0,0,0)); }
    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .title-block h1{
      margin:0;
      font-family:"Ringbearer",Inter,serif;
      letter-spacing:.05em;
      color:var(--accent);
      font-size:1.55rem;
      line-height:1.1;
      text-shadow:0 4px 18px rgba(227,179,34,.22);
    }
    
    .version-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-left:10px;
      padding:4px 9px;
      border-radius:999px;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      font-size:.72em;
      font-weight:900;
      letter-spacing:.08em;
      vertical-align:middle;
      color:#17304a;
      background:linear-gradient(180deg,#ffffff,#edf4ff);
      border:1px solid rgba(43,120,228,.26);
      box-shadow:0 6px 18px rgba(22,32,54,.10);
      white-space:nowrap;
      min-width:68px;
      min-height:28px;
    }
    body.ringmode .version-chip{
      color:#201600;
      background:linear-gradient(180deg,#ffe08a,#f5c04d);
      border:1px solid rgba(255,220,120,.68);
      box-shadow:0 6px 18px rgba(245,192,77,.25);
    }

    @media(max-width:520px){
      h1{
        display:flex;
        flex-wrap:wrap;
        align-items:center;
        gap:8px;
      }
      .version-chip{
        margin-left:0;
        font-size:.74em;
        padding:5px 10px;
      }
    }

    .subtitle{
      margin-top:6px;
      font-size:.92rem;
      color:var(--muted);
      font-weight:700;
    }
    .theme-toggle{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .theme-btn,.chip-btn,.ghost-btn,.primary-btn,.scan-btn,.icon-btn,.date-btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999px;
      font-weight:800;
      transition:transform .08s ease, box-shadow .18s ease, filter .18s ease;
    }
    .theme-btn:hover,.chip-btn:hover,.ghost-btn:hover,.primary-btn:hover,.scan-btn:hover,.icon-btn:hover,.date-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.02);
    }
    .theme-btn:active,.chip-btn:active,.ghost-btn:active,.primary-btn:active,.scan-btn:active,.icon-btn:active,.date-btn:active{
      transform:translateY(1px);
    }
    .theme-btn{
      padding:10px 14px;
      color:var(--muted);
      background:var(--card-2);
      border:1px solid var(--line);
      box-shadow:var(--shadow-1);
    }
    .theme-btn.active{
      color:#1d1503;
      background:var(--warn);
      border-color:transparent;
      box-shadow:0 10px 28px rgba(227,179,34,.35);
    }
    .tab-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:0 16px 14px;
    }
    .tab-btn{
      border:1px solid var(--line);
      background:var(--card-2);
      color:var(--muted);
      border-radius:16px;
      padding:13px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow-1);
    }
    .tab-btn.active{
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.74), var(--card));
      box-shadow:var(--ring), var(--shadow-1);
    }
    body.ringmode .tab-btn.active{
      background:linear-gradient(180deg, rgba(255,255,255,.08), var(--card));
    }
    #tabArea{
      padding:0 16px 18px;
    }
    .panel{
      background:var(--card-2);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow-1);
      padding:14px;
      margin-bottom:14px;
    }
    .calc-grid{
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }
    .field{
      display:grid;
      gap:7px;
      min-width:0;
    }
    .field label{
      font-size:.92rem;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.01em;
    }
    .field input,.field select,.date-input{
      width:100%;
      min-width:0;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }
    body.ringmode .field input, body.ringmode .field select, body.ringmode .date-input{
      background:rgba(255,248,220,.05);
      color:var(--text);
    }
    .field input:focus,.field select:focus,.date-input:focus{
      box-shadow:var(--ring);
      border-color:rgba(43,120,228,.35);
    }
    .slider-wrap{
      background:rgba(255,255,255,.62);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px 14px;
    }
    body.ringmode .slider-wrap{ background:rgba(255,248,220,.04); }
    .slider-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-weight:800;
      margin-bottom:8px;
      color:var(--muted);
    }
    .slider-value{
      color:var(--text);
    }
    .slider-wrap input[type="range"]{
      width:100%;
    }
    .button-row{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:2px;
    }
    .primary-btn,.scan-btn,.ghost-btn,.chip-btn,.date-btn{
      padding:15px 18px;
      font-size:1rem;
      min-height:52px;
    }
    .primary-btn{
      background:linear-gradient(180deg,#2b78e4,#2368cb);
      color:#fff;
      box-shadow:0 14px 24px rgba(43,120,228,.24);
    }
    .scan-btn{
      background:linear-gradient(180deg,#fff2bc,#f6df80);
      color:#332707;
      box-shadow:0 14px 24px rgba(227,179,34,.22);
    }
    body.ringmode .scan-btn{
      background:linear-gradient(180deg,#5a4010,#3a2a08);
      color:#ffd86a;
      box-shadow:0 14px 24px rgba(0,0,0,.26);
    }
    .ghost-btn,.chip-btn,.date-btn{
      background:var(--card);
      color:var(--muted);
      border:1px solid var(--line);
      box-shadow:var(--shadow-1);
    }
    .copy{
      color:var(--muted);
      font-size:.94rem;
      line-height:1.45;
    }
    .goal-line{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .metric-chip{
      background:var(--card-2);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 12px;
      font-weight:800;
      color:var(--text);
      box-shadow:var(--shadow-1);
      font-size:.95rem;
    }
    .metric-chip em{
      color:var(--muted);
      font-style:normal;
      margin-right:4px;
    }
    .date-row{
  display:grid;
  grid-template-columns:56px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  width:100%;
  min-width:0;
}
.date-input{
  min-height:50px;
  min-width:0;
  width:100%;
  max-width:100%;
  appearance:none;
  -webkit-appearance:none;
}
#dateTodayBtn{
  min-width:96px;
  white-space:nowrap;
  justify-self:end;
}
@media(max-width:600px){
  .date-row{
    grid-template-columns:56px minmax(0,1fr);
    grid-template-areas:
      "prev today"
      "date date";
    align-items:center;
    gap:10px;
  }
  #datePrevBtn{
    grid-area:prev;
    justify-self:start;
  }
  #dateTodayBtn{
    grid-area:today;
    justify-self:end;
    min-width:88px;
  }
  #selectedDateInput{
    grid-area:date;
    width:100%;
    max-width:100%;
    min-width:0;
  }
}
    .summary-grid{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
      margin-top:12px;
    }
    .summary-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow-1);
      padding:12px;
    }
    .summary-title{
      font-size:.85rem;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .summary-value{
      font-size:1.35rem;
      font-weight:900;
      color:var(--text);
      line-height:1.1;
    }
    .summary-sub{
      margin-top:4px;
      font-size:.88rem;
      color:var(--muted);
      font-weight:700;
    }
    .bar-stack{
      display:grid;
      gap:10px;
    }
    .bar-card{
      background:var(--card-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow-1);
    }
    .bar-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .bar-name{
      font-size:.95rem;
      font-weight:900;
      letter-spacing:.03em;
      text-transform:uppercase;
    }
    .bar-meta{
      font-size:.88rem;
      color:var(--muted);
      font-weight:800;
    }
    .bar-outer{
      height:18px;
      border-radius:999px;
      background:rgba(21,37,66,.10);
      overflow:hidden;
      position:relative;
    }
    body.ringmode .bar-outer{ background:rgba(255,233,179,.08); }
    .bar-fill{
      height:100%;
      border-radius:999px;
      transition:width .35s cubic-bezier(.2,.8,.2,1);
    }
    .bar-cal{ background:linear-gradient(90deg,#ffdb71,#f1bf42); }
    .bar-p{ background:linear-gradient(90deg,#92e1b2,#40bb79); }
    .bar-c{ background:linear-gradient(90deg,#8bc2ff,#2b78e4); }
    .bar-f{ background:linear-gradient(90deg,#ffca8d,#f29a44); }
    .bar-over{
      box-shadow:0 0 0 2px rgba(228,85,85,.18) inset;
    }
    .bar-status{
      margin-top:8px;
      font-size:.86rem;
      font-weight:800;
      color:var(--muted);
    }
    .meal-form{
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }
    .meal-meta-grid{
      display:grid;
      gap:12px;
      grid-template-columns:1fr 1fr;
    }
    .meal-name-wrap{
      position:relative;
    }
    .autocomplete-list{
      position:absolute;
      inset:auto 0 auto 0;
      top:calc(100% + 6px);
      background:#fffef7;
      border:1px solid rgba(227,179,34,.4);
      border-radius:14px;
      box-shadow:0 12px 28px rgba(0,0,0,.14);
      overflow:auto;
      max-height:240px;
      z-index:90;
      display:none;
    }
    .autocomplete-item{
      padding:11px 12px;
      border-bottom:1px solid rgba(227,179,34,.18);
      color:#5a430f;
      cursor:pointer;
      font-weight:700;
    }
    .autocomplete-item:last-child{ border-bottom:none; }
    .autocomplete-item:hover,.autocomplete-item.active{
      background:rgba(227,179,34,.12);
    }
    .table-card{
      overflow:hidden;
      padding:0;
    }
    .meal-log-table{
      width:100%;
      border-collapse:collapse;
      font-size:.95rem;
    }
    .meal-log-table th,.meal-log-table td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }
    .meal-log-table th{
      color:var(--muted);
      font-size:.84rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      background:rgba(255,255,255,.35);
    }
    body.ringmode .meal-log-table th{ background:rgba(255,255,255,.03); }
    .meal-log-table td.num,.meal-log-table th.num{ text-align:right; }
    .meal-log-table tr:last-child td{ border-bottom:none; }
    .remove-btn{
      background:none;
      border:none;
      color:var(--danger);
      font-weight:900;
      cursor:pointer;
      padding:0;
      font-size:1rem;
    }
    .empty-state{
      padding:22px 16px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
    }
    .streak-box{
      display:grid;
      gap:12px;
      justify-items:center;
      text-align:center;
    }
    .streak-pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      box-shadow:var(--shadow-1);
      font-weight:900;
    }
    .quote-box{
      text-align:center;
      color:var(--muted);
      font-weight:800;
      line-height:1.5;
      font-family:"Ringbearer",Inter,serif;
      padding:4px 8px;
    }
    .floating-debug-btn{
      position:fixed;
      right:14px;
      bottom:calc(14px + var(--safe-bottom));
      width:62px;
      height:62px;
      border-radius:50%;
      border:none;
      background:linear-gradient(180deg,#122744,#0f2139);
      color:#fff;
      font-weight:900;
      letter-spacing:.03em;
      box-shadow:0 18px 34px rgba(0,0,0,.26);
      z-index:1200;
      cursor:pointer;
    }
    body.ringmode .floating-debug-btn{
      background:linear-gradient(180deg,#4a3612,#241808);
      color:#ffd86a;
    }
    .debug-backdrop{
      position:fixed;
      inset:0;
      background:rgba(10,14,20,.46);
      backdrop-filter:blur(4px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:1400;
      padding:14px;
    }
    .debug-panel{
      width:min(100%, 880px);
      max-height:min(88vh, 900px);
      overflow:auto;
      background:var(--card);
      color:var(--text);
      border-radius:26px;
      border:1px solid var(--line);
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:16px;
    }
    .debug-header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }
    .debug-title{
      font-size:1.2rem;
      font-weight:900;
      line-height:1.15;
    }
    .debug-sub{
      margin-top:6px;
      color:var(--muted);
      font-size:.9rem;
      font-weight:700;
    }
    .debug-grid{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
      margin-bottom:12px;
    }
    .debug-card{
      background:var(--card-2);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow-1);
    }
    .debug-card h3{
      margin:0 0 8px;
      font-size:.9rem;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:var(--muted);
    }
    .kv{
      display:grid;
      grid-template-columns:minmax(110px, 140px) 1fr;
      gap:6px 10px;
      font-size:.93rem;
      line-height:1.35;
    }
    .kv b{ color:var(--muted); }
    .debug-log{
      background:#0c121c;
      color:#d6e1f2;
      border-radius:16px;
      padding:12px;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:.84rem;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:180px;
      max-height:300px;
      overflow:auto;
    }
    body.ringmode .debug-log{
      background:#0f0d08;
      color:#f4e9bd;
    }
    .debug-actions{
      display:grid;
      gap:10px;
      grid-template-columns:1fr 1fr;
      margin-top:10px;
    }
    .status-good{ color:var(--accent-2); font-weight:900; }
    .status-warn{ color:var(--warn); font-weight:900; }
    .status-bad{ color:var(--danger); font-weight:900; }
    #barcodeOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:stretch;
      justify-content:stretch;
      background:rgba(0,0,0,.82);
      z-index:2000;
      overflow:hidden;
      touch-action:none;
    }
    #barcodeOverlay .scan-stage{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }
    #barcodeOverlay video,#barcodeOverlay canvas{
      position:absolute;
      inset:0;
      width:100% !important;
      height:100% !important;
      object-fit:cover;
      border-radius:0;
      box-shadow:none;
      background:#000;
    }
    #barcodeOverlay .scan-mask{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(rgba(0,0,0,.52), rgba(0,0,0,.52));
    }
    #barcodeOverlay .scan-guide{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(88vw, 520px);
      height:min(32vw, 180px);
      border:3px solid rgba(255,255,255,.92);
      border-radius:22px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.42);
      pointer-events:none;
    }
    #barcodeOverlay .scan-label{
      position:absolute;
      left:50%;
      top:calc(50% - min(20vw, 110px));
      transform:translateX(-50%);
      color:#fff;
      font-weight:900;
      letter-spacing:.02em;
      text-align:center;
      width:min(90vw, 560px);
      text-shadow:0 6px 18px rgba(0,0,0,.4);
      pointer-events:none;
    }
    #barcodeCloseBtn{
      position:fixed;
      top:calc(14px + var(--safe-top));
      right:14px;
      width:52px;
      height:52px;
      border-radius:999px;
      display:none;
      z-index:2012;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(9,12,18,.68);
      color:#fff;
      font-size:1.4rem;
      font-weight:900;
      backdrop-filter:blur(10px);
    }
    #barcodeCancelBtn{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(18px + var(--safe-bottom));
      display:none;
      z-index:2011;
      min-width:190px;
      background:#fff !important;
      color:#47567a !important;
      border:none !important;
      box-shadow:0 18px 38px rgba(0,0,0,.35);
    }

    @media (min-width: 700px){
      .topbar{ padding:18px 18px 14px; }
      #tabArea{ padding:0 18px 20px; }
      .calc-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .meal-form{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .meal-name-wrap{ grid-column:1 / -1; }
      .meal-meta-grid{ grid-column:1 / -1; grid-template-columns:repeat(4, minmax(0,1fr)); }

      .debug-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 699px){
      .meal-log-table{ display:block; }

        text-transform:uppercase;

    let autocompleteResults = [];

    function localDateKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDateReadable(dateKey){
      const parts = dateKey.split('-').map(Number);
      const dt = new Date(parts[0], parts[1] - 1, parts[2]);
      return dt.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric', year:'numeric' });
    }

    function logDebug(type, message, meta){
      const stamp = new Date().toLocaleTimeString();
      const line = `[${stamp}] ${type.toUpperCase()}: ${message}${meta ? ' | ' + safeStringify(meta) : ''}`;
      state.debug.entries.push(line);
      if(state.debug.entries.length > 180){
        state.debug.entries = state.debug.entries.slice(-180);
      }
      const logEl = document.getElementById('debugLog');
      if(logEl){
        logEl.textContent = state.debug.entries.join('\n');
        logEl.scrollTop = logEl.scrollHeight;
      }
      const statusLine = document.getElementById('debugStatusLine');
      if(statusLine){
        statusLine.textContent = `${APP_VERSION} • ${BUILD_DATE} • ${line}`;
      }
    }

    function safeStringify(obj){
      try{
        return JSON.stringify(obj);
      }catch(err){
        return '[unserializable]';
      }
    }

    function persistState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        ui: state.ui,
        goals: state.goals,
        profile: state.profile,
        calcDraft: state.calcDraft,
        streak: state.streak,
        mealLog: state.mealLog,
        foodCache: state.foodCache
      }));
      refreshDebugPanel();
    }

    function hydrateState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw){
          logDebug('info', 'No saved state found. Using defaults.');
          return;
        }
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === 'object'){
          Object.assign(state.goals, parsed.goals || {});
          Object.assign(state.profile, parsed.profile || {});
          Object.assign(state.calcDraft, parsed.calcDraft || {});
          Object.assign(state.streak, parsed.streak || {});
          state.mealLog = Array.isArray(parsed.mealLog) ? parsed.mealLog : [];
          state.foodCache = Array.isArray(parsed.foodCache) ? parsed.foodCache : [];
          if(parsed.ui && typeof parsed.ui === 'object'){
            state.ui.theme = parsed.ui.theme === 'ring' ? 'ring' : 'light';
            state.ui.activeTab = parsed.ui.activeTab === 'prog' ? 'prog' : 'calc';
            state.ui.selectedDate = parsed.ui.selectedDate || localDateKey(new Date());
          }
          logDebug('info', 'State restored from localStorage.', { meals: state.mealLog.length });
        }
      }catch(err){
        logDebug('error', 'Failed to hydrate state.', { error: String(err) });
      }
    }


    function syncCalcDraftFromDom(){
      const map = {
        formula: 'inputFormula',
        goal: 'inputGoal',
        weight: 'inputWeight',
        height: 'inputHeight',
        age: 'inputAge',
        gender: 'inputGender',
        bodyFat: 'inputBodyFat',
        activity: 'inputActivity',
        weeklyPace: 'inputWeeklyPace',
        goalPercent: 'goalPercent',
        proteinPerLb: 'proteinPerLb',
        goalWeight: 'inputGoalWeight'
      };
      let changed = false;
      Object.entries(map).forEach(([key, id]) => {
        const el = document.getElementById(id);
        if(!el) return;
        const next = String(el.value ?? '');
        if(state.calcDraft[key] !== next){
          state.calcDraft[key] = next;
          changed = true;
        }
      });
      if(changed) persistState();
    }

    function attachCalcDraftPersistence(){
      const ids = ['inputFormula','inputGoal','inputWeight','inputHeight','inputAge','inputGender','inputBodyFat','inputActivity','inputWeeklyPace','goalPercent','proteinPerLb','inputGoalWeight'];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if(!el) return;
        const handler = () => syncCalcDraftFromDom();
        el.addEventListener('input', handler);
        el.addEventListener('change', handler);
      });
    }

    function mealsForDate(dateKey){
      return state.mealLog
        .filter(m => (m.dateKey || localDateKey(new Date(m.date || Date.now()))) === dateKey)
        .sort((a,b) => (a.date || 0) - (b.date || 0));
    }

    function totalsForDate(dateKey){
      return mealsForDate(dateKey).reduce((acc, meal) => {
        acc.calories += Number(meal.calories) || 0;
        acc.protein += Number(meal.protein) || 0;
        acc.carbs += Number(meal.carbs) || 0;
        acc.fat += Number(meal.fat) || 0;
        return acc;
      }, { calories:0, protein:0, carbs:0, fat:0 });
    }

    function statusForMetric(current, goal){
      const remaining = Math.round((goal || 0) - (current || 0));
      if(goal <= 0){
        return { text:'No goal set', className:'status-warn' };
      }
      if(remaining === 0){
        return { text:'Goal nailed exactly', className:'status-good' };
      }
      if(remaining > 0){
        return { text:`${remaining} remaining`, className:'status-warn' };
      }
      return { text:`${Math.abs(remaining)} over goal`, className:'status-bad' };
    }

    function percent(current, goal){
      if(goal <= 0) return 0;
      return Math.min(100, Math.round((current / goal) * 100));
    }

    function applyTheme(theme){
      state.ui.theme = theme === 'ring' ? 'ring' : 'light';
      document.body.classList.toggle('ringmode', state.ui.theme === 'ring');
      document.getElementById('appleLightBtn').classList.toggle('active', state.ui.theme === 'light');
      document.getElementById('ringModeBtn').classList.toggle('active', state.ui.theme === 'ring');
      logDebug('action', 'Theme changed.', { theme: state.ui.theme });
      persistState();
      renderCurrentTab();

    function setActiveTab(tab){

      persistState();
      renderCurrentTab();

    function renderCurrentTab(){

        renderCalculatorTab();

        renderProgressionTab();
      }
      refreshDebugPanel();
    }

    function renderCalculatorTab(){
      const area = document.getElementById('tabArea');
      if(!area) return;
      area.innerHTML = `
        <section class="panel">
          <div class="copy" style="margin-bottom:12px;">
            Pick a formula, activity level, goal, and optional target weight. Goal weight and pace now help drive the calorie math, while the slider acts like a manual adjustment on top.
          </div>
          <form id="calcForm" class="calc-grid">
            <div class="field">
              <label for="inputFormula">Formula</label>
              <select id="inputFormula">
                <option value="msj" ${state.calcDraft.formula === 'msj' ? 'selected' : ''}>Mifflin-St Jeor (modern)</option>
                <option value="hb" ${state.calcDraft.formula === 'hb' ? 'selected' : ''}>Harris-Benedict (legacy)</option>
                <option value="katch" ${state.calcDraft.formula === 'katch' ? 'selected' : ''}>Katch-McArdle (needs body fat %)</option>
              </select>
            </div>
            <div class="field">
              <label for="inputGoal">Goal</label>
              <select id="inputGoal">
                <option value="maintain" ${state.calcDraft.goal === 'maintain' ? 'selected' : ''}>Maintain</option>
                <option value="lose" ${state.calcDraft.goal === 'lose' ? 'selected' : ''}>Lose Fat</option>
                <option value="gain" ${state.calcDraft.goal === 'gain' ? 'selected' : ''}>Gain Muscle</option>
              </select>
            </div>
            <div class="field">
              <label for="inputWeight">Weight (lbs)</label>
              <input id="inputWeight" type="number" inputmode="decimal" min="70" placeholder="180" value="${state.calcDraft.weight || state.profile.currentWeight || ''}">
            </div>
            <div class="field">
              <label for="inputHeight">Height (in)</label>
              <input id="inputHeight" type="number" inputmode="decimal" min="48" placeholder="70" value="${state.calcDraft.height || ''}">

              </select>

            <div class="field">

              <select id="inputWeeklyPace">
                <option value="0.5" ${state.calcDraft.weeklyPace === '0.5' ? 'selected' : ''}>0.5 lb / week</option>

            </div>
            <div class="slider-wrap">
              <div class="slider-row"><span>Calorie adjustment</span><span class="slider-value" id="goalPercentLabel">0%</span></div>
              <input id="goalPercent" type="range" min="-25" max="20" step="1" value="${state.calcDraft.goalPercent || '0'}">

        <section class="panel">
          <div class="copy" style="margin-bottom:12px;">

        proteinPerLbLabel.textContent = Number(proteinPerLb.value).toFixed(2);

        else goalPercent.value = 0;

        syncCalcDraftFromDom();
      });

      proteinPerLb.addEventListener('input', () => { updateProteinLabel(); syncCalcDraftFromDom(); });
      bodyFatWrap.style.display = formulaSel.value === 'katch' ? 'grid' : 'none';

    function handleMacroCalculation(event){
      event.preventDefault();
      const formula = document.getElementById('inputFormula').value;
      const weightLb = Number(document.getElementById('inputWeight').value);
      const heightIn = Number(document.getElementById('inputHeight').value);
      const age = Number(document.getElementById('inputAge').value);
      const gender = document.getElementById('inputGender').value;
      const activity = Number(document.getElementById('inputActivity').value);
      const bodyFat = Number(document.getElementById('inputBodyFat')?.value || 0);
      const adjPct = Number(document.getElementById('goalPercent').value) / 100;
      const proteinPerLb = Number(document.getElementById('proteinPerLb').value || 0.8);
      const goalWeightLb = Number(document.getElementById('inputGoalWeight')?.value || 0);
      const weeklyPace = Number(document.getElementById('inputWeeklyPace')?.value || 1);

      if(!weightLb || !heightIn || !age){
        showToast('Fill in weight, height, and age first.');
        logDebug('warn', 'Macro calculation blocked due to missing inputs.');
        return;
      }

      if(goalWeightLb && goalWeightLb < 70){
        showToast('Enter a realistic goal weight.');
        logDebug('warn', 'Macro calculation blocked: invalid goal weight.', { goalWeightLb });
        return;
      }

      let bmr = 0;
      if(formula === 'msj'){
        const kg = weightLb * 0.45359237;
        const cm = heightIn * 2.54;
        bmr = gender === 'male'
          ? (10 * kg) + (6.25 * cm) - (5 * age) + 5
          : (10 * kg) + (6.25 * cm) - (5 * age) - 161;
      }else if(formula === 'katch'){
        if(!bodyFat || bodyFat <= 0 || bodyFat >= 70){
          showToast('Enter a realistic body fat % for Katch.');
          logDebug('warn', 'Katch calculation blocked: invalid body fat.', { bodyFat });
          return;
        }
        const kg = weightLb * 0.45359237;
        const leanMassKg = kg * (1 - bodyFat / 100);
        bmr = 370 + (21.6 * leanMassKg);
      }else{
        bmr = gender === 'male'
          ? 66 + (6.23 * weightLb) + (12.7 * heightIn) - (6.8 * age)
          : 655 + (4.35 * weightLb) + (4.7 * heightIn) - (4.7 * age);
      }

      const maintenanceCalories = bmr * activity;
      let targetDailyAdjustment = 0;
      let goalMode = document.getElementById('inputGoal')?.value || state.calcDraft.goal || 'maintain';
      let goalWeightDelta = 0;

      if(goalWeightLb){
        goalWeightDelta = Math.round((goalWeightLb - weightLb) * 10) / 10;
        if(Math.abs(goalWeightDelta) >= 1){
          goalMode = goalWeightDelta < 0 ? 'lose' : 'gain';
          targetDailyAdjustment = Math.sign(goalWeightDelta) * ((weeklyPace * 3500) / 7);
        }
      }

      if(!targetDailyAdjustment){
        if(goalMode === 'lose') targetDailyAdjustment = -(weeklyPace * 3500) / 7;
        else if(goalMode === 'gain') targetDailyAdjustment = (weeklyPace * 3500) / 7;
      }

      const manualAdjustment = maintenanceCalories * adjPct;
      const totalCaloriesRaw = maintenanceCalories + targetDailyAdjustment + manualAdjustment;
      const calories = Math.max(1200, Math.round(totalCaloriesRaw));
      const proteinWeightBase = goalWeightLb || weightLb;
      const protein = Math.round(proteinWeightBase * proteinPerLb);
      const fat = Math.max(35, Math.round((calories * 0.25) / 9));
      const carbs = Math.max(0, Math.round((calories - ((protein * 4) + (fat * 9))) / 4));

      state.goals = { calories, protein, carbs, fat };
      state.profile.currentWeight = weightLb;
      state.profile.goalWeight = goalWeightLb || 0;
      state.profile.weeklyPace = weeklyPace;
      state.calcDraft.goal = goalMode;
      state.calcDraft.weight = String(weightLb);
      state.calcDraft.goalWeight = goalWeightLb ? String(goalWeightLb) : '';
      state.calcDraft.weeklyPace = String(weeklyPace);
      persistState();
      showToast(`Goals updated (${formula.toUpperCase()})`);
      logDebug('action', 'Macro goals recalculated.', { formula, calories, protein, carbs, fat, maintenanceCalories: Math.round(maintenanceCalories), targetDailyAdjustment: Math.round(targetDailyAdjustment), manualAdjustment: Math.round(manualAdjustment), goalWeightLb, weeklyPace, goalWeightDelta, goalMode });
      setActiveTab('prog');
    }

    function handleAddMeal(event){
      event.preventDefault();
      const name = document.getElementById('mealName').value.trim();
      const calories = Number(document.getElementById('mealCalories').value);
      const protein = Number(document.getElementById('mealProtein').value) || 0;
      const carbs = Number(document.getElementById('mealCarbs').value) || 0;
      const fat = Number(document.getElementById('mealFat').value) || 0;

      if(!name || !Number.isFinite(calories) || calories <= 0){
        showToast('Meal name and calories are required.');
        logDebug('warn', 'Add meal blocked by validation.', { name, calories });
        return;
      }

      const entry = {
        id: `meal_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
        name,
        calories: Math.round(calories),
        protein: Math.round(protein),
        carbs: Math.round(carbs),
        fat: Math.round(fat),
        date: Date.now(),
        dateKey: state.ui.selectedDate
      };

      state.mealLog.push(entry);

      persistState();

      event.target.reset();
      autocompleteResults = [];
      const list = document.getElementById('autocompleteList');
      if(list) list.style.display = 'none';

      logDebug('action', 'Meal added.', entry);

        const id = btn.getAttribute('data-remove-id');
        removeMealById(id);

    function removeMealById(id){
      const before = state.mealLog.length;
      state.mealLog = state.mealLog.filter(meal => meal.id !== id);
      persistState();
      renderCurrentTab();
      showToast('Meal removed.');
      logDebug('action', 'Meal removed.', { id, removed: before - state.mealLog.length });
    }

    function clearSelectedDayMeals(){
      const day = state.ui.selectedDate;
      const before = state.mealLog.length;
      state.mealLog = state.mealLog.filter(meal => (meal.dateKey || localDateKey(new Date(meal.date || Date.now()))) !== day);
      persistState();
      renderCurrentTab();
      showToast('Selected day cleared.');
      logDebug('action', 'Cleared meals for selected day.', { selectedDate: day, removed: before - state.mealLog.length });
    }

    function updateStreakAfterLogging(dateKey){
      if(state.streak.lastDate === dateKey){
        return;
      }
      if(!state.streak.lastDate){
        state.streak.days = 1;
        state.streak.best = Math.max(state.streak.best, state.streak.days);
        state.streak.lastDate = dateKey;
        return;
      }
      const parts = dateKey.split('-').map(Number);
      const current = new Date(parts[0], parts[1] - 1, parts[2]);
      const lastParts = state.streak.lastDate.split('-').map(Number);
      const last = new Date(lastParts[0], lastParts[1] - 1, lastParts[2]);
      const diffDays = Math.round((current - last) / 86400000);

      if(diffDays === 1){
        state.streak.days += 1;
      }else if(diffDays !== 0){
        state.streak.days = 1;
      }
      if(state.streak.days > state.streak.best){
        state.streak.best = state.streak.days;
        playStreakSound();
      }
      state.streak.lastDate = dateKey;
    }

    function playStreakSound(){
      try{
        const audio = document.getElementById('streakSound');
        if(audio){

          audio.play().catch(() => {});
        }

        logDebug('warn', 'Streak sound failed.', { error: String(err) });
      }
    }

    function exportCSV(allDays){
      const rows = (allDays ? [...state.mealLog] : mealsForDate(state.ui.selectedDate))
        .sort((a,b) => (a.date || 0) - (b.date || 0));
      if(!rows.length){
        showToast('Nothing to export.');
        return;
      }
      const header = ['Date','Meal','Calories','Protein','Carbs','Fat'];
      const lines = rows.map(m => [
        m.dateKey || localDateKey(new Date(m.date || Date.now())),
        csvValue(m.name),
        m.calories,
        m.protein,
        m.carbs,
        m.fat
      ].join(','));
      const content = [header.join(','), ...lines].join('\n');
      const name = allDays ? 'macrolegend_all.csv' : `macrolegend_${state.ui.selectedDate}.csv`;
      downloadTextFile(content, name, 'text/csv;charset=utf-8;');
      showToast(allDays ? 'All meals exported.' : 'Selected day exported.');
      logDebug('action', 'CSV exported.', { allDays, rows: rows.length });
    }

    function csvValue(value){
      const str = String(value ?? '');
      if(/[",\n]/.test(str)){
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    }

    async function downloadTextFile(content, filename, mimeType){
      const blob = new Blob([content], { type: mimeType || 'text/plain;charset=utf-8;' });
      const file = new File([blob], filename, { type: blob.type || 'text/plain;charset=utf-8;' });
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || '');
      const isGSA = /\bGSA\//i.test(navigator.userAgent || '');
      const objectUrl = URL.createObjectURL(blob);
      try{
        if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file], title: filename, text: 'Exported from MacroLegend' });
          showToast('Share sheet opened. Save the file there.');
          logDebug('info', 'Export handed to share sheet.', { filename, size: file.size });
          return true;
        }
      }catch(err){
        logDebug('warn', 'Share-sheet export failed.', { filename, error: String(err) });
      }
      try{
        const link = document.createElement('a');
        link.href = objectUrl;
        link.download = filename;
        link.rel = 'noopener';
        document.body.appendChild(link);
        link.click();
        link.remove();
        if(isIOS || isGSA){
          showToast('If no download appears, use Share or open in Safari.');
        }
        return true;
      }catch(err){
        logDebug('warn', 'Anchor download failed.', { filename, error: String(err) });
      }finally{
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
      }
      try{
        const opened = window.open(objectUrl, '_blank', 'noopener');
        if(opened){
          showToast('Opened export in a new tab. Use Share to save it.');
          logDebug('info', 'Export opened in new tab fallback.', { filename });
          return true;
        }
      }catch(err){
        logDebug('warn', 'New-tab export fallback failed.', { filename, error: String(err) });
      }
      showToast('Export blocked by this browser. Open in Safari for downloads.');
      return false;
    }

    async function scanBarcode(){
      if(state.ui.scanning) return;
      const isiPhoneSafari = isLikelyIPhoneSafari();

      if(!('mediaDevices' in navigator)){
        showToast('Camera not supported on this device.');
        logDebug('warn', 'Barcode scan unavailable: no mediaDevices.');
        launchPhotoBarcodeCapture();
        return;
      }
      if(!window.isSecureContext){
        showToast('Camera usually needs HTTPS.');
        logDebug('warn', 'Barcode scan launched outside secure context.');
      }

      if('BarcodeDetector' in window){
        try{
          const supported = await BarcodeDetector.getSupportedFormats();
          const wanted = ['ean_13','ean_8','upc_a','upc_e','code_128'];
          const formats = wanted.filter(f => supported.includes(f));
          if(formats.length){
            logDebug('info', 'Using native barcode detector.', { formats, isiPhoneSafari });
            await scanBarcodeNative(formats);
            return;
          }
          logDebug('info', 'BarcodeDetector available but desired formats unsupported.', { supported });
        }catch(err){
          logDebug('warn', 'BarcodeDetector setup failed.', { error: String(err), isiPhoneSafari });
        }
      }

      if(isiPhoneSafari){
        showToast('This iPhone browser needs a manual photo. After you take it, scan will run automatically.');
        logDebug('info', 'Using photo barcode capture for iPhone Safari fallback.');
        launchPhotoBarcodeCapture();
        return;
      }

      try{
        await scanBarcodeWithQuagga();
        return;
      }catch(err){
        logDebug('warn', 'Quagga live scan failed. Falling back to snapshot loop.', { error: String(err) });
      }

      await scanBarcodeWithSnapshotLoop();
    }

    function isLikelyIPhoneSafari(){
      const ua = navigator.userAgent || '';
      const isIPhone = /iPhone/i.test(ua);
      const isSafari = /Safari/i.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo/i.test(ua);
      return isIPhone && isSafari;
    }

    async function handleBarcodePhotoSelection(event){

    async function decodeBarcodeFromFile(file){
      const objectUrl = URL.createObjectURL(file);
      try{
        if('BarcodeDetector' in window){
          try{
            const supported = await BarcodeDetector.getSupportedFormats();
            const wanted = ['ean_13','ean_8','upc_a','upc_e','code_128'];
            const formats = wanted.filter(f => supported.includes(f));
            if(formats.length){
              const bitmap = await createImageBitmap(file);
              try{
                const detector = new BarcodeDetector({ formats });
                const barcodes = await detector.detect(bitmap);
                if(barcodes && barcodes.length){
                  const code = (barcodes[0].rawValue || '').trim();
                  if(code){
                    logDebug('action', 'Barcode decoded from photo with native detector.', { code });
                    return code;
                  }
                }
              } finally {
                if(bitmap && bitmap.close) bitmap.close();
              }
            }
          }catch(err){
            logDebug('warn', 'Native photo barcode decode failed. Falling back to Quagga.', { error: String(err) });
          }
        }

        return await new Promise((resolve, reject) => {
          if(!window.Quagga || !Quagga.decodeSingle){
            reject(new Error('Quagga decodeSingle unavailable'));
            return;
          }
          Quagga.decodeSingle({
            src: objectUrl,
            numOfWorkers: 0,
            locate: true,
            locator: { patchSize:'medium', halfSample:false },
            decoder: { readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader'] }
          }, (result) => {
            const code = result && result.codeResult && result.codeResult.code;
            if(code){
              logDebug('action', 'Barcode decoded from photo with Quagga.', { code });
              resolve(code);
            }else{
              resolve('');
            }
          });
        });
      } finally {
        try{ URL.revokeObjectURL(objectUrl); }catch(_){ }
      }
    }

    async function scanBarcodeNative(formats){
      const cancelBtn = document.getElementById('barcodeCancelBtn');
      const closeBtn = document.getElementById('barcodeCloseBtn');
      const stage = buildScannerOverlay('Center the barcode inside the box');
      const video = document.createElement('video');
      video.id = 'nativeBarcodeVideo';
      video.autoplay = true;
      video.playsInline = true;
      video.muted = true;
      stage.appendChild(video);
      cancelBtn.style.display = 'inline-flex';
      closeBtn.style.display = 'inline-flex';
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal:'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            advanced: [{ focusMode:'continuous' }]
          },
          audio:false
        });
        state.ui.nativeStream = stream;
        video.srcObject = stream;
        await video.play();
        state.ui.scanning = true;
        state.ui.scanEngine = 'native';
        logDebug('action', 'Native barcode scan started.', { formats });
        const detector = new BarcodeDetector({ formats });
        const tick = async () => {
          if(!state.ui.scanning || state.ui.scanEngine !== 'native') return;
          try{
            const barcodes = await detector.detect(video);
            if(barcodes && barcodes.length){
              const code = (barcodes[0].rawValue || '').trim();
              if(code){
                stopBarcodeScan();
                handleBarcodeCode(code);
                return;
              }
            }
          }catch(err){
            logDebug('warn', 'Native barcode detect tick failed.', { error: String(err) });
          }
          state.ui.scanRaf = requestAnimationFrame(tick);
        };
        tick();
      }catch(err){
        logDebug('error', 'Native barcode scan failed.', { error: String(err) });
        showToast('Camera could not start.');
        stopBarcodeScan();
        throw err;
      }
    }


    async function scanBarcodeWithSnapshotLoop(){
      const cancelBtn = document.getElementById('barcodeCancelBtn');
      const closeBtn = document.getElementById('barcodeCloseBtn');
      const stage = buildScannerOverlay('Center the barcode, hold steady, and wait a second');
      const video = document.createElement('video');
      video.id = 'snapshotBarcodeVideo';
      video.autoplay = true;
      video.playsInline = true;
      video.muted = true;
      stage.appendChild(video);
      cancelBtn.style.display = 'inline-flex';
      closeBtn.style.display = 'inline-flex';

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal:'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio:false
        });
        state.ui.nativeStream = stream;
        video.srcObject = stream;
        await video.play();
        state.ui.scanning = true;
        state.ui.scanEngine = 'snapshot';
        logDebug('action', 'Snapshot barcode scan started.');

        const attemptDecode = () => {
          if(!state.ui.scanning || state.ui.scanEngine !== 'snapshot') return;
          const vw = video.videoWidth || 0;
          const vh = video.videoHeight || 0;
          if(!vw || !vh){
            state.ui.scanTimer = setTimeout(attemptDecode, 500);
            return;
          }

          // center crop to improve decode density on phones
          const cropW = Math.floor(vw * 0.82);
          const cropH = Math.floor(vh * 0.38);
          const sx = Math.floor((vw - cropW) / 2);
          const sy = Math.floor((vh - cropH) / 2);

          canvas.width = cropW;
          canvas.height = cropH;
          ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, cropW, cropH);

          const src = canvas.toDataURL('image/jpeg', 0.92);
          if(!window.Quagga || !Quagga.decodeSingle){
            logDebug('error', 'Snapshot scan unavailable: Quagga decodeSingle missing.');
            showToast('Scanner decode engine missing.');
            stopBarcodeScan('decode_engine_missing');
            return;
          }

          Quagga.decodeSingle({
            src,
            numOfWorkers: 0,
            locate: true,
            locator: { patchSize:'large', halfSample:false },
            decoder: { readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader'] }
          }, (result) => {
            if(!state.ui.scanning || state.ui.scanEngine !== 'snapshot') return;
            const code = result && result.codeResult && result.codeResult.code;
            if(code){
              logDebug('action', 'Barcode decoded from snapshot loop.', { code });
              stopBarcodeScan('decoded');
              handleBarcodeCode(code);
              return;
            }
            state.ui.scanTimer = setTimeout(attemptDecode, 850);
          });
        };

        state.ui.scanTimer = setTimeout(attemptDecode, 650);
      }catch(err){
        logDebug('error', 'Snapshot barcode scan failed.', { error: String(err) });
        showToast('Camera could not start.');
        stopBarcodeScan('snapshot_start_failed');
        throw err;
      }
    }

    async function scanBarcodeWithQuagga(){
      const cancelBtn = document.getElementById('barcodeCancelBtn');
      const closeBtn = document.getElementById('barcodeCloseBtn');
      const stage = buildScannerOverlay('Move closer until the barcode fills the box');
      cancelBtn.style.display = 'inline-flex';
      closeBtn.style.display = 'inline-flex';

      try{
        Quagga.init({
          inputStream: {
            type: 'LiveStream',
            target: stage,
            constraints: {
              facingMode: { ideal:'environment' },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              aspectRatio: { ideal: 1.7777777778 }
            }
          },
          locator: { patchSize:'large', halfSample:false },
          numOfWorkers: Math.max(1, Math.min(2, navigator.hardwareConcurrency || 2)),
          locate: true,
          frequency: 8,
          decoder: {
            readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader']
          }
        }, (err) => {
          if(err){
            logDebug('error', 'Quagga init failed.', { error: String(err) });
            showToast('Camera could not start.');
            stopBarcodeScan();
            return;
          }
          state.ui.scanning = true;
          state.ui.scanEngine = 'quagga';
          try{
            Quagga.start();
            logDebug('action', 'Quagga barcode scan started.');
          }catch(startErr){
            logDebug('error', 'Quagga start failed.', { error: String(startErr) });
            showToast('Camera start failed.');
            stopBarcodeScan();
            return;
          }
          try{ Quagga.offDetected(barcodeDetected); }catch(_){ }
          Quagga.onDetected(barcodeDetected);
        });
      }catch(err){
        logDebug('error', 'Quagga setup threw before init callback.', { error: String(err) });
        showToast('Camera setup failed.');
        stopBarcodeScan();
      }
    }

    function buildScannerOverlay(labelText){

    function stopBarcodeScan(reason){
      const overlay = document.getElementById('barcodeOverlay');
      const cancelBtn = document.getElementById('barcodeCancelBtn');
      const closeBtn = document.getElementById('barcodeCloseBtn');
      if(state.ui.scanTimer){ try{ clearTimeout(state.ui.scanTimer); }catch(_){ } state.ui.scanTimer = null; }
      if(state.ui.scanRaf){
        try{ cancelAnimationFrame(state.ui.scanRaf); }catch(_){ }
        state.ui.scanRaf = null;
      }
      if(state.ui.nativeStream){
        try{ state.ui.nativeStream.getTracks().forEach(track => track.stop()); }catch(_){ }
        state.ui.nativeStream = null;
      }
      try{
        if(window.Quagga){
          try{ Quagga.offDetected(barcodeDetected); }catch(_){ }
          try{ Quagga.stop(); }catch(_){ }
          try{ Quagga.CameraAccess && Quagga.CameraAccess.release && Quagga.CameraAccess.release(); }catch(_){ }
        }
      }catch(_){ }
      state.ui.scanning = false;
      state.ui.scanEngine = null;
      if(overlay){
        overlay.innerHTML = '';
        overlay.style.display = 'none';
        overlay.setAttribute('aria-hidden', 'true');
      }
      if(cancelBtn) cancelBtn.style.display = 'none';
      if(closeBtn) closeBtn.style.display = 'none';
      if(reason){
        logDebug('info', 'Barcode scan stopped.', { reason });
      }
    }

    function barcodeDetected(data){
      const code = data && data.codeResult && data.codeResult.code;
      if(!code) return;
      stopBarcodeScan();
      handleBarcodeCode(code);
    }

    async function handleBarcodeCode(code){
      showToast(`Scanned: ${code}`);
      logDebug('action', 'Barcode detected.', { code });

      try{
        const product = await lookupBarcodeProduct(code);
        if(!product){
          showToast('No food info found.');
          logDebug('warn', 'Open Food Facts returned no product.', { code });
          return;
        }

        if(state.ui.activeTab !== 'prog'){
          state.ui.activeTab = 'prog';
          renderCurrentTab();
        }

        rememberFoodItem({ code, product_name: product.name, nutriments: { 'energy-kcal_serving': product.calories, 'proteins_serving': product.protein, 'carbohydrates_serving': product.carbs, 'fat_serving': product.fat } });
        fillMealFormFromBarcode(product, code);
        showToast(`Filled ${product.name}`);
        logDebug('action', 'Barcode food auto-filled into meal form.', { code, product });
      }catch(err){
        showToast('Food lookup failed.');
        logDebug('error', 'Barcode lookup failed.', { code, error: String(err) });
      }
    }

    async function lookupBarcodeProduct(code){
      const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(code)}.json`, { cache:'no-store' });
      const info = await response.json();
      if(!(info && info.status === 1 && info.product && info.product.nutriments)){
        return null;
      }
      const n = info.product.nutriments || {};
      let calories = Math.round(n['energy-kcal_serving'] || n['energy-kcal_100g'] || 0);
      if(!calories && n['energy_100g']) calories = Math.round(Number(n['energy_100g']) / 4.184);
      return {
        name: info.product.product_name || info.product.brands || 'Barcode Food',
        calories,
        protein: Math.round(n['proteins_serving'] || n['proteins_100g'] || 0),
        carbs: Math.round(n['carbohydrates_serving'] || n['carbohydrates_100g'] || 0),
        fat: Math.round(n['fat_serving'] || n['fat_100g'] || 0)
      };
    }



function normalizeFoodCacheEntry(item){
  if(!item) return null;
  const nutriments = item.nutriments || {};
  const entry = {
    code: item.code || '',
    product_name: item.product_name || item.name || '',
    generic_name: item.generic_name || '',
    brands: item.brands || '',
    nutriments: {
      'energy-kcal_serving': Math.round(Number(nutriments['energy-kcal_serving'] || item.calories || 0) || 0),
      'energy-kcal_100g': Math.round(Number(nutriments['energy-kcal_100g'] || 0) || 0),
      'proteins_serving': Math.round(Number(nutriments['proteins_serving'] || item.protein || 0) || 0),
      'carbohydrates_serving': Math.round(Number(nutriments['carbohydrates_serving'] || item.carbs || 0) || 0),
      'fat_serving': Math.round(Number(nutriments['fat_serving'] || item.fat || 0) || 0)
    }
  };
  if(!entry.product_name && !entry.brands && !entry.code) return null;
  return entry;
}

function rememberFoodItem(item){
  const normalized = normalizeFoodCacheEntry(item);
  if(!normalized) return;
  const key = (normalized.code || normalized.product_name || normalized.brands).toLowerCase();
  const next = [normalized, ...state.foodCache.filter(existing => {
    const normalizedExisting = normalizeFoodCacheEntry(existing);
    if(!normalizedExisting) return false;
    const existingKey = (normalizedExisting.code || normalizedExisting.product_name || normalizedExisting.brands).toLowerCase();
    return existingKey !== key;
  })].slice(0, 80);
  state.foodCache = next;
  persistState();
}

function localAutocompleteCandidates(){
  const fromMeals = state.mealLog.map(meal => normalizeFoodCacheEntry({
    product_name: meal.name,
    nutriments: {
      'energy-kcal_serving': meal.calories,
      'proteins_serving': meal.protein,
      'carbohydrates_serving': meal.carbs,
      'fat_serving': meal.fat
    }
  })).filter(Boolean);
  return [...state.foodCache, ...fromMeals, ...COMMON_FOOD_LIBRARY].filter(Boolean);
}

function dedupeFoodCandidates(items){
  const seen = new Set();
  return items.filter(item => {
    const normalized = normalizeFoodCacheEntry(item);
    if(!normalized) return false;
    const key = (normalized.code || normalized.product_name || normalized.brands).toLowerCase();
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function renderAutocompleteList(items){
  const list = document.getElementById('autocompleteList');
  autocompleteResults = items.slice(0, 8);
  if(!list) return;
  if(!autocompleteResults.length){
    list.style.display = 'none';
    list.innerHTML = '';
    return;
  }
  list.innerHTML = autocompleteResults.map((item, idx) => {
    const name = escapeHtml(foodCandidateName(item));
    const brand = escapeHtml(item.brands || '');
    const cals = foodCandidateCalories(item);
    const sub = [brand, cals ? `${cals} cal` : ''].filter(Boolean).join(' • ');
    return `<div class="autocomplete-item" data-idx="${idx}"><div>${name}</div>${sub ? `<small style="display:block;color:var(--muted);margin-top:3px;">${sub}</small>` : ''}</div>`;
  }).join('');
  list.style.display = 'block';
}

    function foodCandidateName(item){
      return item.product_name || item.generic_name || item.brands || item.code || 'Food';
    }

    function foodCandidateCalories(item){
      const n = item.nutriments || {};
      return Math.round(n['energy-kcal_serving'] || n['energy-kcal_100g'] || 0);
    }

    function rankAutocompleteResults(products, query){
      const q = (query || '').trim().toLowerCase();
      const words = q.split(/\s+/).filter(Boolean);
      return (products || []).map(item => {
        const name = foodCandidateName(item).toLowerCase();
        const brands = String(item.brands || '').toLowerCase();
        let score = 0;
        if(name === q) score += 120;
        if(name.startsWith(q)) score += 70;
        if(name.includes(q)) score += 40;
        if(brands.includes(q)) score += 18;
        words.forEach(word => {
          if(name.includes(word)) score += 12;
          if(brands.includes(word)) score += 6;
        });
        if(item.image_url) score += 3;
        if(foodCandidateCalories(item) > 0) score += 4;
        return { item, score };
      }).sort((a,b) => b.score - a.score).map(x => x.item);
    }

    function fillMealFormFromFoodItem(food){
      const n = food.nutriments || {};
      const product = {
        name: food.product_name || food.generic_name || food.brands || 'Food',
        calories: Math.round(n['energy-kcal_serving'] || n['energy-kcal_100g'] || ((n['energy_100g'] || 0) / 4.184) || 0),
        protein: Math.round(n['proteins_serving'] || n['proteins_100g'] || 0),
        carbs: Math.round(n['carbohydrates_serving'] || n['carbohydrates_100g'] || 0),
        fat: Math.round(n['fat_serving'] || n['fat_100g'] || 0)
      };
      rememberFoodItem(food);
      fillMealFormFromBarcode(product, food.code || null);
    }

    function fillMealFormFromBarcode(product, code){

      calEl.value = Number.isFinite(product.calories) ? product.calories : '';
      proteinEl.value = Number.isFinite(product.protein) ? product.protein : '';

      nameEl.dispatchEvent(new Event('input', { bubbles:true }));

    }

    function attachAutocompleteEvents(){
      if(autocompleteAttached){
        return;
      }
      const area = document.getElementById('tabArea');
      if(!area) return;


area.addEventListener('input', (event) => {
  const input = event.target.closest('#mealName');

      const data = await response.json();
      const remote = Array.isArray(data.products) ? data.products : [];
      remote.forEach(rememberFoodItem);
      const merged = dedupeFoodCandidates([...localMatches, ...remote]);
      renderAutocompleteList(rankAutocompleteResults(merged, query).slice(0, 8));
    }catch(err){
      logDebug('warn', 'Autocomplete lookup failed.', { error: String(err) });
      if(!localMatches.length){

});

        if(event.target.id !== 'mealName') return;
        const list = document.getElementById('autocompleteList');
        if(event.key === 'Escape' && list){
          list.style.display = 'none';
          return;
        }
        if(!list || list.style.display === 'none') return;
        const items = Array.from(list.querySelectorAll('.autocomplete-item'));
        if(!items.length) return;
        let activeIndex = items.findIndex(el => el.classList.contains('active'));
        if(event.key === 'ArrowDown'){
          event.preventDefault();
          activeIndex = Math.min(activeIndex + 1, items.length - 1);
        }else if(event.key === 'ArrowUp'){
          event.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
        }else if(event.key === 'Enter' && activeIndex >= 0){
          event.preventDefault();
          items[activeIndex].click();
          return;
        }else{
          return;
        }
        items.forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
      });

      autocompleteAttached = true;
    }

    function buildStateSnapshot(){
      const dayMeals = mealsForDate(state.ui.selectedDate);
      const totals = totalsForDate(state.ui.selectedDate);
      return {
        version: APP_VERSION,
        buildDate: BUILD_DATE,
        activeTab: state.ui.activeTab,
        theme: state.ui.theme,
        selectedDate: state.ui.selectedDate,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        secureContext: window.isSecureContext,
        online: navigator.onLine,
        scanning: state.ui.scanning,
        scanEngine: state.ui.scanEngine || 'none',
        mealCountAll: state.mealLog.length,
        mealCountSelectedDay: dayMeals.length,
        totalsSelectedDay: totals,
        goals: state.goals,
        profile: state.profile,
        calcDraft: state.calcDraft,
        streak: state.streak,
        userAgent: navigator.userAgent
      };
    }

    function runChecks(){
      const results = [];
      const add = (name, pass, details) => results.push({ name, pass: !!pass, details: details || '' });

      const snapshot = buildStateSnapshot();
      const selectedMeals = mealsForDate(state.ui.selectedDate);
      const hasDateKeys = state.mealLog.every(m => typeof (m.dateKey || '') === 'string' || typeof m.date === 'number');
      const tablePresent = state.ui.activeTab !== 'prog' || !!document.getElementById('mealLogTable') || !selectedMeals.length;
      const barsPresent = state.ui.activeTab !== 'prog' || document.querySelectorAll('.bar-card,.progress-card').length >= 4;
      const calcPresent = state.ui.activeTab !== 'calc' || !!document.getElementById('calcForm');
      const storageHealthy = !!localStorage.getItem(STORAGE_KEY) || state.mealLog.length === 0;

      add('App root present', !!document.getElementById('appRoot'));
      add('Debug button present', !!document.getElementById('debugFab'));
      add('Barcode overlay present', !!document.getElementById('barcodeOverlay'));
      add('Selected day totals derived', typeof snapshot.totalsSelectedDay.calories === 'number');
      add('Meals use day keys or timestamps', hasDateKeys);
      add('Progress bars render', barsPresent);
      add('Meal table renders when needed', tablePresent);
      add('Calculator form renders', calcPresent);
      add('Saved state available or empty', storageHealthy);

      state.debug.lastChecks = results;
      refreshDebugPanel();

      const failed = results.filter(r => !r.pass);
      logDebug(failed.length ? 'warn' : 'info', 'Checks completed.', { passed: results.length - failed.length, failed: failed.length });
      showToast(failed.length ? `Checks done: ${failed.length} issue(s)` : 'Checks passed');
      return results;
    }

    function refreshDebugPanel(){
      const snapshot = buildStateSnapshot();
      const snapshotEl = document.getElementById('debugSnapshot');
      const storageEl = document.getElementById('debugStorage');
      const checksEl = document.getElementById('debugChecks');
      const notesEl = document.getElementById('debugNotes');
      const logEl = document.getElementById('debugLog');

      if(snapshotEl){
        snapshotEl.innerHTML = `
          <b>Version</b><span>${snapshot.version}</span>
          <b>Build</b><span>${snapshot.buildDate}</span>
          <b>Tab</b><span>${snapshot.activeTab}</span>
          <b>Theme</b><span>${snapshot.theme}</span>
          <b>Selected day</b><span>${snapshot.selectedDate}</span>
          <b>Viewport</b><span>${snapshot.viewport}</span>
          <b>Online</b><span>${snapshot.online}</span>
          <b>Secure</b><span>${snapshot.secureContext}</span>
          <b>Scanning</b><span>${snapshot.scanning}</span>
        `;
      }
      if(storageEl){
        const raw = localStorage.getItem(STORAGE_KEY);
        storageEl.innerHTML = `
          <b>All meals</b><span>${snapshot.mealCountAll}</span>
          <b>Day meals</b><span>${snapshot.mealCountSelectedDay}</span>
          <b>Goal kcal</b><span>${snapshot.goals.calories}</span>
          <b>Streak</b><span>${snapshot.streak.days} / best ${snapshot.streak.best}</span>
          <b>Storage key</b><span>${STORAGE_KEY}</span>
          <b>Storage bytes</b><span>${raw ? raw.length : 0}</span>
        `;
      }
      if(checksEl){
        const checks = state.debug.lastChecks.length ? state.debug.lastChecks : [{ name:'Checks not run yet', pass:false, details:'Tap Run Checks' }];
        checksEl.innerHTML = checks.map(check => `
          <b>${escapeHtml(check.name)}</b>
          <span class="${check.pass ? 'status-good' : 'status-bad'}">${check.pass ? 'PASS' : 'FAIL'}${check.details ? ' • ' + escapeHtml(check.details) : ''}</span>
        `).join('');
      }
      if(notesEl){
        const notes = [];
        if(state.mealLog.some(meal => !meal.dateKey)) notes.push('Legacy meals were found without explicit dateKey. The app still reads them using timestamp fallback.');
        if(!window.isSecureContext) notes.push('Barcode scan is less reliable outside HTTPS.');
        if(navigator.userAgent.toLowerCase().includes('iphone') || navigator.userAgent.toLowerCase().includes('android')){
          notes.push('Mobile device detected. Numeric fields use inputmode to improve keyboard behavior.');
        }
        notes.push('Daily totals now use the selected day only. Historical meals stay saved for exports.');
        if(state.ui.scanning) notes.push('Scanner open. Tap the X, Cancel, or the dark backdrop to exit.');
        notesEl.innerHTML = notes.map(note => `• ${escapeHtml(note)}`).join('<br>');
      }
      if(logEl){
        logEl.textContent = state.debug.entries.join('\n');
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    function copyDebugReport(){
      const report = [
        `MacroLegend Debug Report`,
        `Version: ${APP_VERSION}`,
        `BuildDate: ${BUILD_DATE}`,
        '',
        'Snapshot:',
        safeStringify(buildStateSnapshot()),
        '',
        'Checks:',
        safeStringify(state.debug.lastChecks),
        '',
        'Log:',
        state.debug.entries.join('\n')
      ].join('\n');

      navigator.clipboard.writeText(report)
        .then(() => {
          showToast('Debug report copied.');
          logDebug('action', 'Debug report copied.');
        })
        .catch(err => {
          showToast('Copy failed.');
          logDebug('error', 'Debug report copy failed.', { error: String(err) });
        });
    }

    function copyStateJson(){
      navigator.clipboard.writeText(JSON.stringify({
        ui: state.ui,
        goals: state.goals,
        profile: state.profile,
        calcDraft: state.calcDraft,
        streak: state.streak,
        mealLog: state.mealLog
      }, null, 2))
      .then(() => {
        showToast('State JSON copied.');
        logDebug('action', 'State JSON copied.');
      })
      .catch(err => {
        showToast('Copy failed.');
        logDebug('error', 'State JSON copy failed.', { error: String(err) });
      });
    }

    function clearDebugLog(){
      state.debug.entries = [];
      refreshDebugPanel();
      showToast('Debug log cleared.');
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function wireGlobalEvents(){
      document.getElementById('appleLightBtn').addEventListener('click', () => applyTheme('light'));
      document.getElementById('ringModeBtn').addEventListener('click', () => applyTheme('ring'));
      document.getElementById('tabCalc').addEventListener('click', () => setActiveTab('calc'));
      document.getElementById('tabProg').addEventListener('click', () => setActiveTab('prog'));
      document.getElementById('debugFab').addEventListener('click', openDebugPanel);
      document.getElementById('debugCloseBtn').addEventListener('click', closeDebugPanel);
      document.getElementById('debugBackdrop').addEventListener('click', (event) => {
        if(event.target.id === 'debugBackdrop'){
          closeDebugPanel();
        }
      });
      document.getElementById('runChecksBtn').addEventListener('click', runChecks);
      document.getElementById('copyDebugBtn').addEventListener('click', copyDebugReport);
      document.getElementById('copyStateBtn').addEventListener('click', copyStateJson);
      document.getElementById('clearDebugBtn').addEventListener('click', clearDebugLog);
      document.getElementById('barcodeCancelBtn').addEventListener('click', () => stopBarcodeScan('cancel_button'));
      document.getElementById('barcodeCloseBtn').addEventListener('click', () => stopBarcodeScan('close_button'));
      document.getElementById('barcodePhotoInput').addEventListener('change', handleBarcodePhotoSelection);
      document.getElementById('barcodeOverlay').addEventListener('click', (event) => {
        if(event.target.id === 'barcodeOverlay'){
          stopBarcodeScan('overlay_backdrop');
        }
      });

      window.addEventListener('error', (event) => {
        logDebug('error', 'Window error.', { message: event.message, source: event.filename, line: event.lineno, column: event.colno });
      });
      window.addEventListener('unhandledrejection', (event) => {
        logDebug('error', 'Unhandled promise rejection.', { reason: String(event.reason) });
      });
      window.addEventListener('online', () => { logDebug('info', 'Network back online.'); refreshDebugPanel(); });
      window.addEventListener('offline', () => { logDebug('warn', 'Network offline.'); refreshDebugPanel(); });
      document.addEventListener('visibilitychange', () => {
        if(document.hidden && state.ui.scanning){
          stopBarcodeScan('document_hidden');
        }
      });
      window.addEventListener('pagehide', () => {
        if(state.ui.scanning){
          stopBarcodeScan('pagehide');
        }
      });
      document.addEventListener('keydown', (event) => {
        if(event.key === 'Escape'){
          if(state.ui.scanning){
            stopBarcodeScan('escape_key');
            return;
          }
          closeDebugPanel();
        }
      });
    }

    function normalizeLegacyMeals(){
      let changed = 0;
      state.mealLog = state.mealLog.map(meal => {
        if(!meal.id) meal.id = `meal_${meal.date || Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
        if(!meal.dateKey){
          meal.dateKey = localDateKey(new Date(meal.date || Date.now()));
          changed += 1;
        }
        meal.calories = Math.round(Number(meal.calories) || 0);
        meal.protein = Math.round(Number(meal.protein) || 0);
        meal.carbs = Math.round(Number(meal.carbs) || 0);
        meal.fat = Math.round(Number(meal.fat) || 0);
        meal.name = String(meal.name || 'Food');
        return meal;
      });
      if(changed){
        logDebug('info', 'Legacy meals normalized with date keys.', { changed });
        persistState();
      }
    }

    function init(){
      hydrateState();
      normalizeLegacyMeals();
      wireGlobalEvents();
      syncHeaderVersion();
      applyTheme(state.ui.theme);
      setActiveTab(state.ui.activeTab);
      runChecks();
      logDebug('info', 'App initialized.', { version: APP_VERSION });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
